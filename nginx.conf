# Main app: avito-georgia.smartlaunchhub.com
server {
    listen 80;
    server_name avito-georgia.smartlaunchhub.com;

    root /var/www/avito-georgia/web;
    index index.html;

    location /api/ {
        proxy_pass http://localhost:3813/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Admin panel: admin.avito-georgia.smartlaunchhub.com
# Same static files — admin mode detected at runtime via window.location.hostname
