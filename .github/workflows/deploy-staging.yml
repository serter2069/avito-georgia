name: Deploy Staging

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

env:
  DEPLOY_DIR: /var/www/avito-georgia
  STAGING_URL: https://avito-georgia.smartlaunchhub.com
  DOPPLER_TOKEN_FILE: /etc/doppler/avito-georgia-stg.token

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install API dependencies
        run: cd api && npm ci

      - name: TypeScript check (API)
        run: cd api && npx tsc --noEmit

      - name: Test Expo export
        run: npx expo export --platform web --output-dir dist-test

      - name: Verify build output
        run: |
          test -f dist-test/index.html || (echo "ERROR: index.html missing" && exit 1)
          echo "Build output OK"

  deploy:
    runs-on: [self-hosted, Linux]
    needs: [validate]
    if: github.event_name == 'push'
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Save current commit for rollback
        run: |
          cd ${{ env.DEPLOY_DIR }}
          echo "ROLLBACK_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Git pull latest code
        run: |
          cd ${{ env.DEPLOY_DIR }}
          git fetch origin development
          git reset --hard origin/development

      - name: Install frontend dependencies
        run: |
          cd ${{ env.DEPLOY_DIR }}
          npm ci

      - name: Build frontend (Expo web)
        run: |
          cd ${{ env.DEPLOY_DIR }}
          export DOPPLER_TOKEN=$(cat ${{ env.DOPPLER_TOKEN_FILE }})
          doppler run -- npx expo export --platform web --output-dir web

      - name: Install API dependencies
        run: |
          cd ${{ env.DEPLOY_DIR }}/api
          npm ci

      - name: Build API
        run: |
          cd ${{ env.DEPLOY_DIR }}/api
          export DOPPLER_TOKEN=$(cat ${{ env.DOPPLER_TOKEN_FILE }})
          doppler run -- npx prisma generate
          npx tsc

      - name: Run database migrations
        run: |
          cd ${{ env.DEPLOY_DIR }}/api
          export DOPPLER_TOKEN=$(cat ${{ env.DOPPLER_TOKEN_FILE }})
          doppler run -- npx prisma migrate deploy || echo "WARNING: migrate deploy failed, trying db push"
          doppler run -- npx prisma db push --accept-data-loss 2>/dev/null || true

      - name: Generate version.json
        run: |
          cd ${{ env.DEPLOY_DIR }}
          cat > web/version.json << EOF
          {
            "version": "$(git rev-parse --short HEAD)",
            "commit": "$(git rev-parse HEAD)",
            "branch": "development",
            "deployed": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "message": "$(git log -1 --pretty=%s | head -c 100)"
          }
          EOF

      - name: Fix permissions
        run: |
          chown -R deployer:www-data ${{ env.DEPLOY_DIR }}
          chmod -R u+rwX,g+rX,o-rwx ${{ env.DEPLOY_DIR }}

      - name: Restart API
        run: |
          pm2 restart avito-georgia-api --update-env || pm2 start ${{ env.DEPLOY_DIR }}/start.sh --name avito-georgia-api
          pm2 save
          sleep 3

      - name: Verify deployment
        run: |
          # Check version.json matches this commit
          EXPECTED=$(git -C ${{ env.DEPLOY_DIR }} rev-parse --short HEAD)
          ACTUAL=$(curl -sf ${{ env.STAGING_URL }}/version.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "ERROR: version mismatch. Expected=$EXPECTED Actual=$ACTUAL"
            exit 1
          fi
          echo "Frontend OK: version=$ACTUAL"

          # Check API health
          API_STATUS=$(curl -sf ${{ env.STAGING_URL }}/api/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$API_STATUS" != "ok" ]; then
            echo "ERROR: API health check failed"
            exit 1
          fi
          echo "API OK: status=$API_STATUS"

      - name: Rollback on failure
        if: failure() && env.ROLLBACK_COMMIT != ''
        run: |
          echo "ROLLING BACK to ${{ env.ROLLBACK_COMMIT }}"
          cd ${{ env.DEPLOY_DIR }}
          git reset --hard ${{ env.ROLLBACK_COMMIT }}
          npm ci
          export DOPPLER_TOKEN=$(cat ${{ env.DOPPLER_TOKEN_FILE }})
          doppler run -- npx expo export --platform web --output-dir web
          cd api && npm ci
          doppler run -- npx prisma generate
          npx tsc
          cd ..
          chown -R deployer:www-data ${{ env.DEPLOY_DIR }}
          chmod -R u+rwX,g+rX,o-rwx ${{ env.DEPLOY_DIR }}
          pm2 restart avito-georgia-api
          echo "Rollback complete"

      - name: Sync canvas.json to proto-canvas
        if: success()
        env:
          PROTO_CANVAS_API_KEY: ${{ secrets.PROTO_CANVAS_API_KEY }}
          PROTO_CANVAS_PROJECT_ID: 1bea57a8-c011-4583-8257-02d41fe8a100
          PROTO_CANVAS_CANVAS_ID: 6e272bbe-3cb0-4698-8167-f4663202083a
        run: |
          cd ${{ env.DEPLOY_DIR }}
          if [ -f public/proto/canvas.json ]; then
            node -e "
            const fs = require('fs');
            const https = require('https');
            const pages = JSON.parse(fs.readFileSync('public/proto/canvas.json')).pages;
            const screens = pages.map((p, i) => ({
              id: p.id, html: true, name: p.title,
              size: { width: p.w, height: p.h }, children: [],
              position: { x: i * (p.w + 120), y: 60 }
            }));
            const schemaJson = {
              meta: { name: 'avito-georgia', stagingDomain: '${{ env.STAGING_URL }}'.replace('https://','') },
              tokens: {}, screens
            };
            const body = JSON.stringify({ schemaJson });
            const req = https.request({
              hostname: 'proto.smartlaunchhub.com',
              path: '/api/projects/' + process.env.PROTO_CANVAS_PROJECT_ID + '/canvases/' + process.env.PROTO_CANVAS_CANVAS_ID,
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + process.env.PROTO_CANVAS_API_KEY, 'Content-Length': Buffer.byteLength(body) }
            }, res => { let d=''; res.on('data', c => d+=c); res.on('end', () => console.log('proto-canvas sync:', res.statusCode, d.slice(0,100))); });
            req.on('error', e => { console.error('proto-canvas sync failed:', e.message); });
            req.write(body); req.end();
            "
          fi
