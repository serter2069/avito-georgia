name: Deploy Staging

on:
  push:
    branches: [development]

jobs:
  deploy-frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web --output-dir dist

      - name: Generate version.json
        run: |
          cat > dist/version.json << EOF
          {
            "version": "$(git rev-parse --short HEAD)",
            "commit": "$(git rev-parse HEAD)",
            "branch": "${{ github.ref_name }}",
            "deployed": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "message": "$(git log -1 --pretty=%s | head -c 100)"
          }
          EOF

      - name: Deploy frontend
        run: |
          rsync -av --delete dist/ /var/www/avito-georgia/web/
          sudo chown -R root:www-data /var/www/avito-georgia/web/
          sudo chmod -R g+rw /var/www/avito-georgia/web/

      - name: Apply nginx config
        run: |
          sudo cp nginx.conf /etc/nginx/sites-available/avito-georgia
          sudo ln -sf /etc/nginx/sites-available/avito-georgia /etc/nginx/sites-enabled/avito-georgia
          sudo nginx -t && sudo systemctl reload nginx

