name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web --output-dir dist

      - name: Generate version.json
        run: |
          cat > dist/version.json << EOF
          {
            "version": "$(git rev-parse --short HEAD)",
            "commit": "$(git rev-parse HEAD)",
            "branch": "${{ github.ref_name }}",
            "deployed": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "message": "$(git log -1 --pretty=%s | head -c 100)"
          }
          EOF

      - name: Deploy frontend
        run: |
          rsync -av --delete dist/ /var/www/avito-georgia/web/
          sudo chown -R github-runner:www-data /var/www/avito-georgia/web/
          sudo chmod -R g+rw /var/www/avito-georgia/web/

  deploy-api:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DEV_AUTH: ${{ secrets.DEV_AUTH }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          rsync -av --delete --exclude 'node_modules' --exclude '.env' --exclude '.git' \
            api/ /var/www/avito-georgia/api/
          cd /var/www/avito-georgia/api && npm ci
          cd /var/www/avito-georgia/api && DATABASE_URL="${DATABASE_URL}" npm run build
          # Stop existing pm2 process (ignore error if not running yet)
          sudo pm2 delete avito-georgia-api 2>/dev/null || true
          # Start fresh with current env vars so all secrets are loaded
          sudo DATABASE_URL="${DATABASE_URL}" \
            JWT_SECRET="${JWT_SECRET}" \
            JWT_REFRESH_SECRET="${JWT_REFRESH_SECRET}" \
            DEV_AUTH="${DEV_AUTH}" \
            SMTP_HOST="${SMTP_HOST}" \
            SMTP_PORT="${SMTP_PORT}" \
            SMTP_FROM="${SMTP_FROM}" \
            pm2 start /var/www/avito-georgia/api/dist/index.js \
              --name avito-georgia-api \
              --cwd /var/www/avito-georgia/api
          sudo chown -R github-runner:www-data /var/www/avito-georgia/api/
          sudo chmod -R g+rw /var/www/avito-georgia/api/
